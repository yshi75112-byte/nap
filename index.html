<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OC Map Studio</title>
  <style>
    :root {
      --paper: #f8fafc;
      --paper-deep: #e2e8f0;
      --ink: #1f2937;
      --muted: #64748b;
      --line: #d7dee8;
      --panel: rgba(255, 255, 255, 0.96);
      --panel-strong: #ffffff;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      --radius: 8px;
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.95), transparent 34%),
        linear-gradient(135deg, #f1f5f9 0%, #ffffff 42%, #e9eef5 100%);
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid rgba(15, 23, 42, 0.14);
      background: #ffffff;
      color: var(--ink);
      border-radius: var(--radius);
      min-height: 36px;
      padding: 0 12px;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7) inset;
    }

    button:hover {
      background: #f1f5f9;
    }

    button:active {
      transform: translateY(1px);
    }

    button.icon-button {
      width: 38px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button.primary {
      background: #2f5136;
      color: #ffffff;
      border-color: #2f5136;
    }

    button.primary:hover {
      background: #24432c;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    .toolbar,
    .palette,
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .tool-button.is-active,
    .swatch.is-active {
      outline: 2px solid #1f2937;
      outline-offset: 2px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      min-width: 150px;
      line-height: 1.15;
    }

    .brand strong {
      font-size: 14px;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
    }

    .brand span.is-dirty {
      color: #8f2635;
    }

    .palette {
      flex: 1;
      justify-content: center;
      overflow: hidden;
    }

    .swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.98);
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.2), 0 4px 12px rgba(15, 23, 42, 0.12);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    .map-frame {
      position: absolute;
      inset: 0;
      background-color: var(--paper);
      background-image:
        linear-gradient(rgba(100, 116, 139, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 116, 139, 0.07) 1px, transparent 1px);
      background-size: 42px 42px;
    }

    .map-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(148, 163, 184, 0.1), transparent 12%, transparent 88%, rgba(148, 163, 184, 0.1)),
        linear-gradient(rgba(148, 163, 184, 0.08), transparent 14%, transparent 84%, rgba(148, 163, 184, 0.1));
      mix-blend-mode: multiply;
    }

    #mapSvg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: default;
    }

    #mapSvg.is-drawing-tool {
      cursor: crosshair;
    }

    #mapSvg.is-drawing-tool .region-group {
      pointer-events: none;
    }

    .context-shape {
      fill: rgba(47, 81, 54, 0.06);
      stroke: rgba(47, 81, 54, 0.38);
      stroke-width: 2;
      stroke-dasharray: 8 6;
      pointer-events: none;
    }

    .region-shape {
      stroke: rgba(31, 37, 32, 0.8);
      stroke-width: 2.2;
      stroke-linejoin: round;
      transition: filter 120ms ease, transform 120ms ease, opacity 120ms ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    .region-group {
      cursor: pointer;
    }

    .region-group:hover .region-shape {
      filter: drop-shadow(0 8px 10px rgba(15, 23, 42, 0.2));
      transform: translateY(-1px);
      stroke-dasharray: 10 5;
      animation: dash 1.1s linear infinite;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -30;
      }
    }

    .region-label {
      pointer-events: none;
      font-weight: 700;
      font-size: 15px;
      fill: #1f2937;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, 0.94);
      stroke-width: 4px;
      stroke-linejoin: round;
      text-anchor: middle;
    }

    .region-label.is-unnamed {
      fill: #64748b;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 120ms ease;
    }

    .region-group:hover .region-label.is-unnamed,
    .region-group:focus .region-label.is-unnamed,
    .region-group.is-selected .region-label.is-unnamed {
      opacity: 1;
    }

    .region-group:focus {
      outline: none;
    }

    .region-group:focus .region-shape {
      stroke-width: 3;
    }

    .region-group.is-selected .region-shape {
      stroke: #2f5136;
      stroke-width: 3.4;
      filter: drop-shadow(0 8px 12px rgba(15, 23, 42, 0.18));
    }

    .draft-line {
      fill: none;
      stroke: #1f2937;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 6 5;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      left: 14px;
      top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      z-index: 5;
    }

    .breadcrumb,
    .hint {
      width: max-content;
      max-width: min(560px, calc(100vw - 28px));
      border: 1px solid rgba(148, 163, 184, 0.32);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
      padding: 8px 10px;
      color: var(--muted);
      font-size: 13px;
      pointer-events: auto;
    }

    .breadcrumb button {
      min-height: 26px;
      padding: 0 7px;
      border: 0;
      background: transparent;
      color: #2f5136;
      box-shadow: none;
    }

    .breadcrumb button:hover {
      background: rgba(47, 81, 54, 0.08);
    }

    .hint .hint-action {
      min-height: 26px;
      margin-left: 8px;
      padding: 0 8px;
      color: #2f5136;
    }

    .inspector-panel {
      position: absolute;
      right: 14px;
      top: 14px;
      z-index: 12;
      width: 310px;
      max-width: calc(100vw - 28px);
      max-height: calc(100% - 28px);
      border: 1px solid rgba(148, 163, 184, 0.34);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: auto;
      display: none;
    }

    .inspector-panel.is-open {
      display: block;
    }

    .inspector-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(248, 250, 252, 0.82);
    }

    .inspector-header strong {
      font-size: 14px;
    }

    .inspector-form {
      padding: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 13px;
      color: #475569;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.45);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--ink);
      padding: 9px 10px;
      outline: none;
    }

    .field input[type="color"] {
      height: 40px;
      padding: 4px;
      cursor: pointer;
    }

    .field textarea {
      min-height: 74px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #2f5136;
      box-shadow: 0 0 0 3px rgba(47, 81, 54, 0.12);
    }

    .inspector-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    button.danger {
      color: #9f1239;
      border-color: rgba(190, 24, 93, 0.24);
      background: #fff1f2;
    }

    button.danger:hover {
      background: #ffe4e6;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 2;
      color: rgba(71, 85, 105, 0.72);
      text-align: center;
      padding: 22px;
    }

    .empty-state strong {
      display: block;
      color: rgba(31, 41, 55, 0.82);
      font-size: clamp(24px, 5vw, 46px);
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .empty-state span {
      display: block;
      font-size: 14px;
      line-height: 1.6;
    }

    .empty-state.is-hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: stretch;
        flex-wrap: wrap;
        gap: 9px;
      }

      .brand {
        width: 100%;
      }

      .palette {
        order: 3;
        width: 100%;
        justify-content: flex-start;
      }

      .actions {
        margin-left: auto;
      }

      .inspector-panel {
        width: calc(100vw - 28px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <strong>OC Map Studio</strong>
        <span id="projectStatus">正在载入项目…</span>
      </div>

      <div class="toolbar" aria-label="工具栏">
        <button class="icon-button tool-button is-active" id="browseTool" title="浏览与选择" aria-label="浏览与选择">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m5 3 12 9-6 1.5L9 20 5 3Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="icon-button tool-button" id="drawTool" title="绘制区域" aria-label="绘制区域">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 20c5-1 12-6 16-16-8 4-15 11-16 16Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M8 16c2 0 5-2 8-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-button tool-button" id="eyedropperTool" title="吸管" aria-label="吸管">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m14 5 5 5M11 8l5 5M4 20l6-2 9-9-4-4-9 9-2 6Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="palette" id="palette" aria-label="色板"></div>

      <div class="actions">
        <button class="desktop-only" id="newProjectButton" title="新建项目 (Ctrl+N)">新建</button>
        <button class="desktop-only" id="openProjectButton" title="打开项目 (Ctrl+O)">打开</button>
        <button class="desktop-only" id="saveProjectButton" title="保存项目 (Ctrl+S)">保存</button>
        <button id="exportPngButton" title="导出 PNG">导出</button>
      </div>
    </header>

    <section class="stage">
      <div class="map-frame">
        <svg id="mapSvg" aria-label="OC 地图画布">
          <g id="contextLayer"></g>
          <g id="regionLayer"></g>
          <path id="draftPath" class="draft-line"></path>
        </svg>
        <div class="empty-state" id="emptyState">
          <div>
            <strong>先画一个地方</strong>
            <span>点击顶部绘制工具，然后按住并拖动画出封闭区域。</span>
          </div>
        </div>
      </div>

      <div class="hud">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="hint" id="hint">浏览模式。单击选择区域，双击进入下级。</div>
      </div>

      <aside class="inspector-panel" id="inspectorPanel" aria-labelledby="inspectorTitle">
        <div class="inspector-header">
          <strong id="inspectorTitle">区域属性</strong>
          <button class="icon-button" id="closeInspector" type="button" title="关闭属性面板" aria-label="关闭属性面板">×</button>
        </div>
        <form class="inspector-form" id="inspectorForm">
          <div class="field">
            <label for="inspectorName">名称</label>
            <input id="inspectorName" autocomplete="off" placeholder="未命名">
          </div>
          <div class="field">
            <label for="inspectorType">类型</label>
            <select id="inspectorType">
              <option value="region">区域</option>
              <option value="city">城市</option>
              <option value="family">家族</option>
              <option value="country">国家</option>
              <option value="continent">大陆</option>
            </select>
          </div>
          <div class="field">
            <label for="inspectorParent">所属上级</label>
            <select id="inspectorParent"></select>
          </div>
          <div class="field">
            <label for="inspectorColor">颜色</label>
            <input id="inspectorColor" type="color">
          </div>
          <div class="field">
            <label for="inspectorSummary">一句简介</label>
            <textarea id="inspectorSummary" placeholder="记录这个地方最重要的设定。"></textarea>
          </div>
          <div class="inspector-actions">
            <button type="button" class="danger" id="deleteRegion">删除区域</button>
            <button type="submit" class="primary">应用修改</button>
          </div>
        </form>
      </aside>
    </section>
  </main>

  <script>
    const svg = document.getElementById("mapSvg");
    const contextLayer = document.getElementById("contextLayer");
    const regionLayer = document.getElementById("regionLayer");
    const draftPath = document.getElementById("draftPath");
    const palette = document.getElementById("palette");
    const hint = document.getElementById("hint");
    const breadcrumb = document.getElementById("breadcrumb");
    const emptyState = document.getElementById("emptyState");
    const inspectorPanel = document.getElementById("inspectorPanel");
    const inspectorForm = document.getElementById("inspectorForm");
    const inspectorName = document.getElementById("inspectorName");
    const inspectorType = document.getElementById("inspectorType");
    const inspectorParent = document.getElementById("inspectorParent");
    const inspectorColor = document.getElementById("inspectorColor");
    const inspectorSummary = document.getElementById("inspectorSummary");
    const closeInspector = document.getElementById("closeInspector");
    const deleteRegionButton = document.getElementById("deleteRegion");
    const browseTool = document.getElementById("browseTool");
    const drawTool = document.getElementById("drawTool");
    const eyedropperTool = document.getElementById("eyedropperTool");
    const exportPngButton = document.getElementById("exportPngButton");
    const newProjectButton = document.getElementById("newProjectButton");
    const openProjectButton = document.getElementById("openProjectButton");
    const saveProjectButton = document.getElementById("saveProjectButton");
    const projectStatus = document.getElementById("projectStatus");

    const regionTypes = {
      region: "区域",
      city: "城市",
      family: "家族",
      country: "国家",
      continent: "大陆"
    };

    const colors = ["#2f5136", "#b08a2d", "#8f2635", "#254a7a", "#c83d2f", "#263238", "#7f35ff", "#2eb9ff", "#ff4fa3"];
    let selectedColor = colors[0];
    let selectedTool = "browse";
    let selectedRegionId = null;
    let isDrawing = false;
    let points = [];
    let currentViewId = null;
    let regions = [];
    let layers = [];
    const isDesktop = Boolean(window.desktopAPI);
    let projectRevision = 0;
    let projectDirty = false;
    let currentProjectPath = null;
    let currentProjectName = "未命名项目";

    function getProjectDocument() {
      return {
        regions,
        layers,
        currentViewId
      };
    }

    function updateProjectStatus(metadata = {}) {
      if (Object.prototype.hasOwnProperty.call(metadata, "filePath")) {
        currentProjectPath = metadata.filePath || null;
      }
      if (metadata.displayName) currentProjectName = metadata.displayName;
      if (typeof metadata.dirty === "boolean") projectDirty = metadata.dirty;

      const stateLabel = projectDirty
        ? "未保存"
        : currentProjectPath
          ? "已保存"
          : "尚未保存";
      projectStatus.textContent = `${currentProjectName} · ${stateLabel}`;
      projectStatus.classList.toggle("is-dirty", projectDirty);
    }

    function markProjectChanged() {
      projectRevision += 1;
      projectDirty = true;
      updateProjectStatus({ dirty: true });
      window.desktopAPI.updateProject({
        document: getProjectDocument(),
        revision: projectRevision
      });
    }

    function applyProject(result) {
      const document = result.document || {};
      regions = Array.isArray(document.regions) ? document.regions : [];
      layers = Array.isArray(document.layers) ? document.layers : [];
      currentViewId = typeof document.currentViewId === "string" ? document.currentViewId : null;
      if (currentViewId && !regions.some((region) => region.id === currentViewId)) {
        currentViewId = null;
      }
      selectedRegionId = null;
      setTool("browse");
      projectRevision = Number.isInteger(result.revision) ? result.revision : 0;
      updateProjectStatus(result);
      render();
    }

    async function runProjectCommand(command) {
      if (!isDesktop) return;

      try {
        let result = null;
        if (command === "new") result = await window.desktopAPI.newProject();
        if (command === "open") result = await window.desktopAPI.openProject();
        if (command === "save") {
          result = await window.desktopAPI.saveProject({
            document: getProjectDocument(),
            revision: projectRevision
          });
        }
        if (command === "save-as") {
          result = await window.desktopAPI.saveProjectAs({
            document: getProjectDocument(),
            revision: projectRevision
          });
        }

        if (!result || result.canceled) return;
        if (result.document) {
          applyProject(result);
          hint.textContent = command === "new" ? "已创建空白项目。" : `已打开「${result.displayName}」。`;
        } else {
          updateProjectStatus(result);
          hint.textContent = `项目已保存到「${result.displayName}」。`;
        }
      } catch (error) {
        hint.textContent = `操作失败：${error.message}`;
      }
    }

    function createSwatches() {
      colors.forEach((color, index) => {
        const swatch = document.createElement("button");
        swatch.className = "swatch" + (index === 0 ? " is-active" : "");
        swatch.type = "button";
        swatch.style.background = color;
        swatch.title = color;
        swatch.setAttribute("aria-label", `选择颜色 ${color}`);
        swatch.addEventListener("click", () => {
          selectedColor = color;
          document.querySelectorAll(".swatch").forEach((item) => item.classList.remove("is-active"));
          swatch.classList.add("is-active");
        });
        palette.appendChild(swatch);
      });
    }

    function setTool(tool) {
      if (isDrawing) cancelDrawing();
      selectedTool = tool;
      browseTool.classList.toggle("is-active", tool === "browse");
      drawTool.classList.toggle("is-active", tool === "draw");
      eyedropperTool.classList.toggle("is-active", tool === "eyedropper");
      svg.classList.toggle("is-drawing-tool", tool === "draw");
      svg.style.cursor = tool === "eyedropper" ? "copy" : "";
      if (tool === "browse") hint.textContent = "浏览模式。单击选择区域，双击进入下级。";
      if (tool === "draw") hint.textContent = "绘制模式。按住并拖动画区域，松手后自动闭合。按 Esc 可取消。";
      if (tool === "eyedropper") hint.textContent = "吸管已选中。点击任意区域取色后返回浏览模式。";
    }

    function getSvgPoint(event) {
      const rect = svg.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function simplifyPoints(rawPoints) {
      const simplified = [];
      rawPoints.forEach((point) => {
        const previous = simplified[simplified.length - 1];
        if (!previous || distance(previous, point) > 4) {
          simplified.push(point);
        }
      });
      return simplified;
    }

    function pointsToPath(pathPoints, closed = true) {
      if (!pathPoints.length) return "";
      const commands = [`M ${pathPoints[0].x.toFixed(1)} ${pathPoints[0].y.toFixed(1)}`];
      for (let index = 1; index < pathPoints.length; index += 1) {
        commands.push(`L ${pathPoints[index].x.toFixed(1)} ${pathPoints[index].y.toFixed(1)}`);
      }
      if (closed) commands.push("Z");
      return commands.join(" ");
    }

    function getPolygonArea(pathPoints) {
      let doubleArea = 0;
      for (let index = 0; index < pathPoints.length; index += 1) {
        const current = pathPoints[index];
        const next = pathPoints[(index + 1) % pathPoints.length];
        doubleArea += current.x * next.y - next.x * current.y;
      }
      return Math.abs(doubleArea) / 2;
    }

    function getPointBounds(pathPoints) {
      const xs = pathPoints.map((point) => point.x);
      const ys = pathPoints.map((point) => point.y);
      return {
        width: Math.max(...xs) - Math.min(...xs),
        height: Math.max(...ys) - Math.min(...ys)
      };
    }

    function getCentroid(pathPoints) {
      let doubleArea = 0;
      let x = 0;
      let y = 0;
      for (let index = 0; index < pathPoints.length; index += 1) {
        const current = pathPoints[index];
        const next = pathPoints[(index + 1) % pathPoints.length];
        const cross = current.x * next.y - next.x * current.y;
        doubleArea += cross;
        x += (current.x + next.x) * cross;
        y += (current.y + next.y) * cross;
      }
      if (Math.abs(doubleArea) < 0.001) {
        const total = pathPoints.reduce((acc, point) => ({ x: acc.x + point.x, y: acc.y + point.y }), { x: 0, y: 0 });
        return { x: total.x / pathPoints.length, y: total.y / pathPoints.length };
      }
      return { x: x / (3 * doubleArea), y: y / (3 * doubleArea) };
    }

    function isRegionNamed(region) {
      return Boolean(region && typeof region.name === "string" && region.name.trim());
    }

    function getRegionDisplayName(region) {
      return isRegionNamed(region) ? region.name.trim() : "未命名";
    }

    function getDescendantIds(regionId, result = new Set()) {
      regions.forEach((region) => {
        if (region.parentId === regionId && !result.has(region.id)) {
          result.add(region.id);
          getDescendantIds(region.id, result);
        }
      });
      return result;
    }

    function renderInspector() {
      const region = getRegionById(selectedRegionId);
      inspectorPanel.classList.toggle("is-open", Boolean(region));
      if (!region) return;

      inspectorName.value = isRegionNamed(region) ? region.name.trim() : "";
      inspectorType.value = region.type || "region";
      inspectorColor.value = /^#[0-9a-f]{6}$/i.test(region.color) ? region.color : colors[0];
      inspectorSummary.value = region.summary || "";

      const excludedIds = getDescendantIds(region.id);
      excludedIds.add(region.id);
      inspectorParent.innerHTML = "";
      const worldOption = document.createElement("option");
      worldOption.value = "";
      worldOption.textContent = "世界（顶层）";
      inspectorParent.appendChild(worldOption);
      regions
        .filter((candidate) => !excludedIds.has(candidate.id))
        .forEach((candidate) => {
          const option = document.createElement("option");
          option.value = candidate.id;
          option.textContent = getRegionPath(candidate).map(getRegionDisplayName).join(" › ");
          inspectorParent.appendChild(option);
        });
      inspectorParent.value = region.parentId || "";
    }

    function selectRegion(region, options = {}) {
      selectedRegionId = region ? region.id : null;
      regionLayer.querySelectorAll(".region-group").forEach((group) => {
        group.classList.toggle("is-selected", group.dataset.regionId === selectedRegionId);
      });
      renderInspector();
      if (region && options.focusName) {
        window.setTimeout(() => inspectorName.focus(), 0);
      }
    }

    function getRegionById(id) {
      return regions.find((region) => region.id === id);
    }

    function getVisibleRegions() {
      return regions.filter((region) => (region.parentId || null) === currentViewId);
    }

    function getRegionPath(region) {
      const path = [];
      let cursor = region;
      while (cursor) {
        path.unshift(cursor);
        cursor = cursor.parentId ? getRegionById(cursor.parentId) : null;
      }
      return path;
    }

    function navigateToView(regionId) {
      currentViewId = regionId || null;
      selectedRegionId = null;
      setTool("browse");
      render();
      const currentRegion = getRegionById(currentViewId);
      hint.textContent = currentRegion
        ? `当前层级：${getRegionDisplayName(currentRegion)}。单击选择子区域，点击绘制可添加子区域。`
        : "当前层级：世界。单击选择区域，点击绘制可添加区域。";
    }

    function renderBreadcrumb() {
      const trail = currentViewId ? getRegionPath(getRegionById(currentViewId)) : [];
      breadcrumb.innerHTML = "";
      const worldButton = document.createElement("button");
      worldButton.type = "button";
      worldButton.textContent = "世界";
      worldButton.addEventListener("click", () => navigateToView(null));
      breadcrumb.appendChild(worldButton);

      trail.forEach((region) => {
        breadcrumb.append(" > ");
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = getRegionDisplayName(region);
        button.addEventListener("click", () => navigateToView(region.id));
        breadcrumb.appendChild(button);
      });
    }

    function renderContext() {
      contextLayer.innerHTML = "";
      const currentRegion = getRegionById(currentViewId);
      if (!currentRegion) return;

      const shape = document.createElementNS("http://www.w3.org/2000/svg", "path");
      shape.setAttribute("d", pointsToPath(currentRegion.points));
      shape.classList.add("context-shape");
      contextLayer.appendChild(shape);
    }

    function renderRegions() {
      regionLayer.innerHTML = "";
      const visibleRegions = getVisibleRegions();
      emptyState.classList.toggle("is-hidden", visibleRegions.length > 0);
      const emptyTitle = emptyState.querySelector("strong");
      const emptyText = emptyState.querySelector("span");
      if (!regions.length) {
        emptyTitle.textContent = "先画一个地方";
        emptyText.textContent = "点击顶部绘制工具，然后按住并拖动画出封闭区域。";
      } else {
        emptyTitle.textContent = "这里还没有子地域";
        emptyText.textContent = "点击绘制工具，在当前层级添加第一个子区域。";
      }

      visibleRegions.forEach((region) => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.classList.add("region-group");
        if (region.id === selectedRegionId) group.classList.add("is-selected");
        group.dataset.regionId = region.id;

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", pointsToPath(region.points));
        path.setAttribute("fill", region.color);
        path.setAttribute("fill-opacity", "0.74");
        path.classList.add("region-shape");

        const center = getCentroid(region.points);
        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", center.x);
        label.setAttribute("y", center.y);
        label.setAttribute("dy", "0.35em");
        label.classList.add("region-label");
        label.textContent = getRegionDisplayName(region);
        if (!isRegionNamed(region)) label.classList.add("is-unnamed");

        group.append(path, label);

        const displayName = getRegionDisplayName(region);
        group.setAttribute("tabindex", "0");
        group.setAttribute("role", "button");
        group.setAttribute("aria-label", `${displayName}，单击选择，双击进入下级`);

        group.addEventListener("dblclick", (event) => {
          if (selectedTool !== "browse") return;
          event.preventDefault();
          event.stopPropagation();
          navigateToView(region.id);
        });
        group.addEventListener("click", (event) => {
          if (selectedTool === "eyedropper") {
            event.stopPropagation();
            selectedColor = region.color;
            updateActiveSwatch(region.color);
            setTool("browse");
            return;
          }
          if (selectedTool !== "browse") return;
          event.stopPropagation();
          selectRegion(region);
        });
        group.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          event.stopPropagation();
          setTool("browse");
          selectRegion(region, { focusName: true });
        });
        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            selectRegion(region);
          }
          if (event.key === "F2" || event.key === "ContextMenu" || (event.shiftKey && event.key === "F10")) {
            event.preventDefault();
            selectRegion(region, { focusName: true });
          }
        });

        regionLayer.appendChild(group);
      });
    }

    function updateActiveSwatch(color) {
      const swatches = Array.from(document.querySelectorAll(".swatch"));
      let matched = false;
      swatches.forEach((swatch) => {
        const isMatch = swatch.title.toLowerCase() === color.toLowerCase();
        swatch.classList.toggle("is-active", isMatch);
        if (isMatch) matched = true;
      });
      if (!matched) {
        swatches.forEach((swatch) => swatch.classList.remove("is-active"));
      }
    }

    function render() {
      renderBreadcrumb();
      renderContext();
      renderRegions();
      renderInspector();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function startDrawing(event) {
      if (event.button !== 0 || selectedTool !== "draw") return;
      event.preventDefault();
      selectedRegionId = null;
      regionLayer.querySelectorAll(".is-selected").forEach((group) => group.classList.remove("is-selected"));
      inspectorPanel.classList.remove("is-open");
      isDrawing = true;
      points = [getSvgPoint(event)];
      draftPath.setAttribute("d", pointsToPath(points, false));
      svg.setPointerCapture(event.pointerId);
    }

    function continueDrawing(event) {
      if (!isDrawing) return;
      points.push(getSvgPoint(event));
      draftPath.setAttribute("d", pointsToPath(points, false));
    }

    function finishDrawing(event) {
      if (!isDrawing) return;
      isDrawing = false;
      if (svg.hasPointerCapture(event.pointerId)) svg.releasePointerCapture(event.pointerId);
      const pathPoints = simplifyPoints(points);
      points = [];
      draftPath.setAttribute("d", "");

      const bounds = pathPoints.length >= 3 ? getPointBounds(pathPoints) : { width: 0, height: 0 };
      const area = pathPoints.length >= 3 ? getPolygonArea(pathPoints) : 0;
      if (pathPoints.length < 3 || bounds.width < 24 || bounds.height < 24 || area < 600) {
        hint.textContent = "这个区域的有效面积太小，请画出更完整的封闭范围。";
        return;
      }

      const region = createRegion({
        name: "",
        type: "region",
        summary: "",
        points: pathPoints,
        color: selectedColor,
        parentId: currentViewId
      });

      selectedRegionId = region.id;
      saveState();
      setTool("browse");
      render();
      showCreatedRegionHint(region);
      window.setTimeout(() => inspectorName.focus(), 0);
    }

    function cancelDrawing(event = null) {
      if (!isDrawing) return;
      isDrawing = false;
      if (event && svg.hasPointerCapture(event.pointerId)) svg.releasePointerCapture(event.pointerId);
      points = [];
      draftPath.setAttribute("d", "");
      hint.textContent = "已取消当前绘制。";
    }

    function createRegion(data) {
      const now = new Date().toISOString();
      const region = {
        id: `region-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        name: typeof data.name === "string" ? data.name.trim() : "",
        type: data.type,
        parentId: data.parentId || null,
        points: data.points,
        color: data.color,
        summary: data.summary,
        characterIds: [],
        createdAt: now,
        updatedAt: now
      };

      const layer = {
        id: `layer-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        name: region.name,
        type: "region",
        regionId: region.id,
        visible: true,
        locked: false,
        order: layers.length,
        createdAt: now,
        updatedAt: now
      };

      regions.push(region);
      layers.push(layer);
      return region;
    }

    function showCreatedRegionHint(region) {
      const parent = region.parentId ? getRegionById(region.parentId) : null;
      const location = parent ? `，归属到「${getRegionDisplayName(parent)}」` : "，位于世界层级";
      hint.textContent = `已创建未命名区域${location}。请在右侧完善信息。`;

      const undoButton = document.createElement("button");
      undoButton.type = "button";
      undoButton.className = "hint-action";
      undoButton.textContent = "撤销刚才绘制";
      undoButton.addEventListener("click", () => {
        const hasChildren = regions.some((item) => item.parentId === region.id);
        if (hasChildren) {
          hint.textContent = "这个区域已有下级，不能直接撤销。";
          return;
        }
        regions = regions.filter((item) => item.id !== region.id);
        layers = layers.filter((item) => item.regionId !== region.id);
        if (selectedRegionId === region.id) selectedRegionId = null;
        if (currentViewId === region.id) currentViewId = region.parentId || null;
        saveState();
        render();
        hint.textContent = "已撤销刚才绘制的区域。";
      });
      hint.appendChild(undoButton);
    }

    function exportPng() {
      const width = svg.clientWidth;
      const height = svg.clientHeight;
      const visibleRegions = getVisibleRegions();
      const regionMarkup = visibleRegions.map((region) => {
        const center = getCentroid(region.points);
        const labelMarkup = isRegionNamed(region)
          ? `<text x="${center.x}" y="${center.y}" dy="0.35em" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937" stroke="rgba(255,255,255,0.94)" stroke-width="4" paint-order="stroke">${escapeHtml(region.name.trim())}</text>`
          : "";
        return `
          <path d="${pointsToPath(region.points)}" fill="${region.color}" fill-opacity="0.74" stroke="rgba(31,37,32,0.8)" stroke-width="2.2" stroke-linejoin="round"/>
          ${labelMarkup}
        `;
      }).join("");
      const svgText = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
          <rect width="100%" height="100%" fill="#f8fafc"/>
          ${regionMarkup}
        </svg>
      `;
      const image = new Image();
      const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      image.onload = async () => {
        const canvas = document.createElement("canvas");
        canvas.width = svg.clientWidth;
        canvas.height = svg.clientHeight;
        const context = canvas.getContext("2d");
        context.fillStyle = "#f8fafc";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0);
        URL.revokeObjectURL(url);

        const dataUrl = canvas.toDataURL("image/png");
        if (isDesktop) {
          try {
            const currentRegion = currentViewId ? getRegionById(currentViewId) : null;
            const result = await window.desktopAPI.exportPng({
              dataUrl,
              suggestedName: currentRegion && isRegionNamed(currentRegion) ? currentRegion.name.trim() : currentProjectName
            });
            if (!result.canceled) hint.textContent = "PNG 已导出。";
          } catch (error) {
            hint.textContent = `PNG 导出失败：${error.message}`;
          }
        } else {
          const link = document.createElement("a");
          link.download = "oc-map.png";
          link.href = dataUrl;
          link.click();
        }
      };

      image.src = url;
    }

    function saveState() {
      if (isDesktop) {
        markProjectChanged();
        return;
      }

      localStorage.setItem("oc-map-studio-prototype", JSON.stringify({
        regions,
        layers,
        currentViewId
      }));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem("oc-map-studio-prototype");
        if (!raw) return;
        const state = JSON.parse(raw);
        regions = Array.isArray(state.regions) ? state.regions : [];
        layers = Array.isArray(state.layers) ? state.layers : [];
        currentViewId = state.currentViewId || null;
      } catch (error) {
        console.warn("Failed to load saved map state", error);
      }
    }

    svg.addEventListener("pointerdown", startDrawing);
    svg.addEventListener("pointermove", continueDrawing);
    svg.addEventListener("pointerup", finishDrawing);
    svg.addEventListener("pointercancel", cancelDrawing);
    svg.addEventListener("click", (event) => {
      if (selectedTool === "browse" && event.target === svg) selectRegion(null);
    });

    inspectorForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const region = getRegionById(selectedRegionId);
      if (!region) return;
      const previousParentId = region.parentId || null;
      const nextParentId = inspectorParent.value || null;
      const invalidParents = getDescendantIds(region.id);
      if (nextParentId === region.id || invalidParents.has(nextParentId)) {
        hint.textContent = "不能把区域归属到自己或自己的下级。";
        return;
      }

      region.name = inspectorName.value.trim();
      region.type = inspectorType.value;
      region.parentId = nextParentId;
      region.color = inspectorColor.value;
      region.summary = inspectorSummary.value.trim();
      region.updatedAt = new Date().toISOString();
      const layer = layers.find((item) => item.regionId === region.id);
      if (layer) {
        layer.name = region.name;
        layer.updatedAt = region.updatedAt;
      }
      if (previousParentId !== nextParentId) currentViewId = nextParentId;
      saveState();
      render();
      hint.textContent = previousParentId === nextParentId
        ? `区域信息已更新：${getRegionDisplayName(region)}。`
        : `已将「${getRegionDisplayName(region)}」移动到新的上级。`;
    });

    deleteRegionButton.addEventListener("click", () => {
      const region = getRegionById(selectedRegionId);
      if (!region) return;
      const descendantIds = getDescendantIds(region.id);
      const extra = descendantIds.size ? `\n它的 ${descendantIds.size} 个下级也会一起删除。` : "";
      if (!window.confirm(`确定删除「${getRegionDisplayName(region)}」吗？${extra}`)) return;
      const deletedIds = new Set([region.id, ...descendantIds]);
      regions = regions.filter((item) => !deletedIds.has(item.id));
      layers = layers.filter((item) => !item.regionId || !deletedIds.has(item.regionId));
      if (currentViewId && deletedIds.has(currentViewId)) currentViewId = region.parentId || null;
      selectedRegionId = null;
      saveState();
      render();
      hint.textContent = `已删除「${getRegionDisplayName(region)}」。`;
    });

    closeInspector.addEventListener("click", () => selectRegion(null));
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        if (isDrawing) {
          cancelDrawing();
        } else if (selectedRegionId) {
          selectRegion(null);
          hint.textContent = "已取消选择。";
        }
      }
    });
    browseTool.addEventListener("click", () => setTool("browse"));
    drawTool.addEventListener("click", () => setTool("draw"));
    eyedropperTool.addEventListener("click", () => setTool("eyedropper"));
    exportPngButton.addEventListener("click", exportPng);
    newProjectButton.addEventListener("click", () => runProjectCommand("new"));
    openProjectButton.addEventListener("click", () => runProjectCommand("open"));
    saveProjectButton.addEventListener("click", () => runProjectCommand("save"));

    async function initializeApp() {
      createSwatches();

      if (!isDesktop) {
        document.querySelectorAll(".desktop-only").forEach((element) => {
          element.hidden = true;
        });
        currentProjectName = "浏览器草稿";
        loadState();
        updateProjectStatus({ displayName: currentProjectName, dirty: false });
        render();
        return;
      }

      window.desktopAPI.onCommand((command) => runProjectCommand(command));
      window.desktopAPI.onProjectSaved((metadata) => {
        const isLatestRevision = metadata.revision === projectRevision;
        updateProjectStatus({
          ...metadata,
          dirty: isLatestRevision ? metadata.dirty : true
        });
        if (metadata.automatic && isLatestRevision) {
          hint.textContent = "修改已自动保存。";
        }
      });
      window.desktopAPI.onProjectError((error) => {
        projectDirty = true;
        updateProjectStatus({ dirty: true });
        hint.textContent = error.message;
      });

      try {
        const initialProject = await window.desktopAPI.getInitialProject();
        applyProject(initialProject);
      } catch (error) {
        updateProjectStatus({ displayName: "未命名项目", dirty: false });
        hint.textContent = `桌面项目初始化失败：${error.message}`;
        render();
      }
    }

    initializeApp();
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OC Map Studio</title>
  <style>
    :root {
      --paper: #efe1bf;
      --paper-deep: #d8c28d;
      --ink: #1f2520;
      --muted: #6f6147;
      --line: #3a2d1f;
      --panel: rgba(255, 248, 226, 0.94);
      --panel-strong: #fff7df;
      --shadow: 0 18px 50px rgba(43, 32, 17, 0.22);
      --radius: 8px;
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 250, 232, 0.65), transparent 32%),
        linear-gradient(135deg, #e6d29a 0%, #f5e8c8 42%, #d2ba7e 100%);
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid rgba(49, 39, 24, 0.25);
      background: #fff7de;
      color: var(--ink);
      border-radius: var(--radius);
      min-height: 36px;
      padding: 0 12px;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.5) inset;
    }

    button:hover {
      background: #fff1c9;
    }

    button:active {
      transform: translateY(1px);
    }

    button.icon-button {
      width: 38px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button.primary {
      background: #2f5136;
      color: #fff8e4;
      border-color: #2f5136;
    }

    button.primary:hover {
      background: #24432c;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(67, 49, 27, 0.22);
      background: rgba(248, 235, 194, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 28px rgba(65, 44, 19, 0.12);
    }

    .toolbar,
    .palette,
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .tool-button.is-active,
    .swatch.is-active {
      outline: 2px solid #1f2520;
      outline-offset: 2px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      min-width: 150px;
      line-height: 1.15;
    }

    .brand strong {
      font-size: 14px;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
    }

    .brand span.is-dirty {
      color: #8f2635;
    }

    .palette {
      flex: 1;
      justify-content: center;
      overflow: hidden;
    }

    .swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(255, 248, 229, 0.95);
      box-shadow: 0 0 0 1px rgba(38, 29, 19, 0.25), 0 4px 12px rgba(32, 24, 16, 0.16);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .stage {
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    .map-frame {
      position: absolute;
      inset: 0;
      background-color: var(--paper);
      background-image:
        linear-gradient(rgba(71, 52, 28, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(71, 52, 28, 0.045) 1px, transparent 1px);
      background-size: 42px 42px;
    }

    .map-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(99, 69, 28, 0.2), transparent 12%, transparent 88%, rgba(99, 69, 28, 0.18)),
        linear-gradient(rgba(99, 69, 28, 0.16), transparent 14%, transparent 84%, rgba(99, 69, 28, 0.18));
      mix-blend-mode: multiply;
    }

    #mapSvg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }

    .region-shape {
      stroke: rgba(31, 37, 32, 0.8);
      stroke-width: 2.2;
      stroke-linejoin: round;
      transition: filter 120ms ease, transform 120ms ease, opacity 120ms ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    .region-group:hover .region-shape {
      filter: drop-shadow(0 8px 10px rgba(42, 33, 18, 0.28));
      transform: translateY(-1px);
      stroke-dasharray: 10 5;
      animation: dash 1.1s linear infinite;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -30;
      }
    }

    .region-label {
      pointer-events: none;
      font-weight: 700;
      font-size: 15px;
      fill: #24251e;
      paint-order: stroke;
      stroke: rgba(255, 247, 222, 0.9);
      stroke-width: 4px;
      stroke-linejoin: round;
      text-anchor: middle;
    }

    .draft-line {
      fill: none;
      stroke: #24251e;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 6 5;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      left: 14px;
      top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      z-index: 5;
    }

    .breadcrumb,
    .hint {
      width: max-content;
      max-width: min(560px, calc(100vw - 28px));
      border: 1px solid rgba(49, 39, 24, 0.18);
      border-radius: var(--radius);
      background: rgba(255, 248, 226, 0.88);
      box-shadow: 0 10px 26px rgba(43, 32, 17, 0.12);
      padding: 8px 10px;
      color: var(--muted);
      font-size: 13px;
      pointer-events: auto;
    }

    .breadcrumb button {
      min-height: 26px;
      padding: 0 7px;
      border: 0;
      background: transparent;
      color: #2f5136;
      box-shadow: none;
    }

    .breadcrumb button:hover {
      background: rgba(47, 81, 54, 0.08);
    }

    .story-card {
      position: fixed;
      z-index: 30;
      width: 280px;
      max-width: calc(100vw - 28px);
      padding: 14px;
      border: 1px solid rgba(51, 39, 22, 0.22);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 100ms ease, transform 100ms ease;
    }

    .story-card.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .story-card h2 {
      margin: 0 0 4px;
      font-size: 17px;
      line-height: 1.2;
    }

    .story-meta {
      color: #6b5130;
      font-size: 12px;
      margin-bottom: 9px;
    }

    .story-card p {
      margin: 0 0 11px;
      color: #3e382c;
      line-height: 1.55;
      font-size: 13px;
    }

    .story-chars {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      border: 1px solid rgba(47, 81, 54, 0.18);
      border-radius: 999px;
      background: rgba(47, 81, 54, 0.08);
      padding: 3px 8px;
      font-size: 12px;
      color: #2f5136;
    }

    .layer-panel {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 12;
      width: 278px;
      max-width: calc(100vw - 28px);
      border: 1px solid rgba(51, 39, 22, 0.22);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .layer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(51, 39, 22, 0.12);
      background: rgba(255, 247, 223, 0.75);
    }

    .layer-header strong {
      font-size: 14px;
    }

    .layer-list {
      max-height: 240px;
      overflow: auto;
      padding: 8px;
      display: none;
    }

    .layer-panel.is-open .layer-list {
      display: block;
    }

    .layer-item {
      display: grid;
      grid-template-columns: 20px 1fr auto;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 8px;
      border-radius: 6px;
      color: #3e382c;
      font-size: 13px;
    }

    .layer-item:hover {
      background: rgba(47, 81, 54, 0.08);
    }

    .layer-color {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(35, 26, 15, 0.24);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(31, 25, 16, 0.28);
      backdrop-filter: blur(3px);
    }

    .modal-backdrop.is-open {
      display: flex;
    }

    .modal {
      width: min(420px, 100%);
      border: 1px solid rgba(51, 39, 22, 0.24);
      border-radius: var(--radius);
      background: var(--panel-strong);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 13px;
      color: #5a4b32;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid rgba(49, 39, 24, 0.24);
      border-radius: var(--radius);
      background: #fffdf4;
      color: var(--ink);
      padding: 9px 10px;
      outline: none;
    }

    .field textarea {
      min-height: 74px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #2f5136;
      box-shadow: 0 0 0 3px rgba(47, 81, 54, 0.12);
    }

    .ownership {
      border: 1px dashed rgba(49, 39, 24, 0.24);
      border-radius: var(--radius);
      padding: 10px;
      margin-bottom: 14px;
      background: rgba(239, 225, 191, 0.45);
      color: #5a4b32;
      font-size: 13px;
      line-height: 1.45;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 2;
      color: rgba(46, 37, 23, 0.62);
      text-align: center;
      padding: 22px;
    }

    .empty-state strong {
      display: block;
      color: rgba(32, 29, 22, 0.75);
      font-size: clamp(24px, 5vw, 46px);
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .empty-state span {
      display: block;
      font-size: 14px;
      line-height: 1.6;
    }

    .empty-state.is-hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: stretch;
        flex-wrap: wrap;
        gap: 9px;
      }

      .brand {
        width: 100%;
      }

      .palette {
        order: 3;
        width: 100%;
        justify-content: flex-start;
      }

      .actions {
        margin-left: auto;
      }

      .layer-panel {
        width: calc(100vw - 28px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <strong>OC Map Studio</strong>
        <span id="projectStatus">正在载入项目…</span>
      </div>

      <div class="toolbar" aria-label="工具栏">
        <button class="icon-button tool-button is-active" id="drawTool" title="柳叶笔" aria-label="柳叶笔">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 20c5-1 12-6 16-16-8 4-15 11-16 16Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M8 16c2 0 5-2 8-8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-button tool-button" id="eyedropperTool" title="吸管" aria-label="吸管">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m14 5 5 5M11 8l5 5M4 20l6-2 9-9-4-4-9 9-2 6Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="palette" id="palette" aria-label="色板"></div>

      <div class="actions">
        <button class="desktop-only" id="newProjectButton" title="新建项目 (Ctrl+N)">新建</button>
        <button class="desktop-only" id="openProjectButton" title="打开项目 (Ctrl+O)">打开</button>
        <button class="desktop-only" id="saveProjectButton" title="保存项目 (Ctrl+S)">保存</button>
        <button id="exportPngButton" title="导出 PNG">导出</button>
      </div>
    </header>

    <section class="stage">
      <div class="map-frame">
        <svg id="mapSvg" aria-label="OC 地图画布">
          <g id="regionLayer"></g>
          <path id="draftPath" class="draft-line"></path>
        </svg>
        <div class="empty-state" id="emptyState">
          <div>
            <strong>先画一个地方</strong>
            <span>按住并拖动画出封闭区域，松手后给它取名。</span>
          </div>
        </div>
      </div>

      <div class="hud">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="hint" id="hint">柳叶笔已选中。画完会自动闭合并弹出命名。</div>
      </div>

      <aside class="layer-panel" id="layerPanel">
        <div class="layer-header">
          <strong>图层</strong>
          <button class="icon-button" id="toggleLayers" title="展开图层" aria-label="展开图层">
            <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m12 3 9 5-9 5-9-5 9-5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="m3 13 9 5 9-5M3 18l9 5 9-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="layer-list" id="layerList"></div>
      </aside>
    </section>
  </main>

  <div class="story-card" id="storyCard"></div>

  <div class="modal-backdrop" id="regionModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <form class="modal" id="regionForm">
      <h2 id="modalTitle">给这个地方取名</h2>
      <div class="field">
        <label for="regionName">名称</label>
        <input id="regionName" name="name" required autocomplete="off" placeholder="例如：雾港城">
      </div>
      <div class="field">
        <label for="regionType">类型</label>
        <select id="regionType" name="type">
          <option value="city" selected>城市</option>
          <option value="family">家族</option>
          <option value="country">国家</option>
          <option value="continent">大陆</option>
        </select>
      </div>
      <div class="field">
        <label for="regionSummary">一句简介</label>
        <textarea id="regionSummary" name="summary" placeholder="例如：终年雾气缠绕的港口城市，贵族和走私者共享同一条夜路。"></textarea>
      </div>
      <div class="ownership" id="ownershipHint">正在检测归属...</div>
      <div class="modal-actions">
        <button type="button" id="cancelRegion">取消</button>
        <button type="submit" class="primary">完成</button>
      </div>
    </form>
  </div>

  <script>
    const svg = document.getElementById("mapSvg");
    const regionLayer = document.getElementById("regionLayer");
    const draftPath = document.getElementById("draftPath");
    const palette = document.getElementById("palette");
    const modal = document.getElementById("regionModal");
    const form = document.getElementById("regionForm");
    const nameInput = document.getElementById("regionName");
    const typeInput = document.getElementById("regionType");
    const summaryInput = document.getElementById("regionSummary");
    const ownershipHint = document.getElementById("ownershipHint");
    const cancelRegion = document.getElementById("cancelRegion");
    const hint = document.getElementById("hint");
    const storyCard = document.getElementById("storyCard");
    const breadcrumb = document.getElementById("breadcrumb");
    const emptyState = document.getElementById("emptyState");
    const layerPanel = document.getElementById("layerPanel");
    const toggleLayers = document.getElementById("toggleLayers");
    const layerList = document.getElementById("layerList");
    const drawTool = document.getElementById("drawTool");
    const eyedropperTool = document.getElementById("eyedropperTool");
    const exportPngButton = document.getElementById("exportPngButton");
    const newProjectButton = document.getElementById("newProjectButton");
    const openProjectButton = document.getElementById("openProjectButton");
    const saveProjectButton = document.getElementById("saveProjectButton");
    const projectStatus = document.getElementById("projectStatus");

    const regionTypes = {
      city: "城市",
      family: "家族",
      country: "国家",
      continent: "大陆"
    };

    const colors = ["#2f5136", "#b08a2d", "#8f2635", "#254a7a", "#c83d2f", "#263238", "#7f35ff", "#2eb9ff", "#ff4fa3"];
    let selectedColor = colors[0];
    let selectedTool = "draw";
    let isDrawing = false;
    let points = [];
    let pendingRegion = null;
    let suggestedParentId = null;
    let currentViewId = null;
    let regions = [];
    let layers = [];
    const isDesktop = Boolean(window.desktopAPI);
    let projectRevision = 0;
    let projectDirty = false;
    let currentProjectPath = null;
    let currentProjectName = "未命名项目";

    function getProjectDocument() {
      return {
        regions,
        layers,
        currentViewId
      };
    }

    function updateProjectStatus(metadata = {}) {
      if (Object.prototype.hasOwnProperty.call(metadata, "filePath")) {
        currentProjectPath = metadata.filePath || null;
      }
      if (metadata.displayName) currentProjectName = metadata.displayName;
      if (typeof metadata.dirty === "boolean") projectDirty = metadata.dirty;

      const stateLabel = projectDirty
        ? "未保存"
        : currentProjectPath
          ? "已保存"
          : "尚未保存";
      projectStatus.textContent = `${currentProjectName} · ${stateLabel}`;
      projectStatus.classList.toggle("is-dirty", projectDirty);
    }

    function markProjectChanged() {
      projectRevision += 1;
      projectDirty = true;
      updateProjectStatus({ dirty: true });
      window.desktopAPI.updateProject({
        document: getProjectDocument(),
        revision: projectRevision
      });
    }

    function applyProject(result) {
      const document = result.document || {};
      regions = Array.isArray(document.regions) ? document.regions : [];
      layers = Array.isArray(document.layers) ? document.layers : [];
      currentViewId = typeof document.currentViewId === "string" ? document.currentViewId : null;
      if (currentViewId && !regions.some((region) => region.id === currentViewId)) {
        currentViewId = null;
      }
      projectRevision = Number.isInteger(result.revision) ? result.revision : 0;
      updateProjectStatus(result);
      hideStoryCard();
      render();
    }

    async function runProjectCommand(command) {
      if (!isDesktop) return;

      try {
        let result = null;
        if (command === "new") result = await window.desktopAPI.newProject();
        if (command === "open") result = await window.desktopAPI.openProject();
        if (command === "save") {
          result = await window.desktopAPI.saveProject({
            document: getProjectDocument(),
            revision: projectRevision
          });
        }
        if (command === "save-as") {
          result = await window.desktopAPI.saveProjectAs({
            document: getProjectDocument(),
            revision: projectRevision
          });
        }

        if (!result || result.canceled) return;
        if (result.document) {
          applyProject(result);
          hint.textContent = command === "new" ? "已创建空白项目。" : `已打开「${result.displayName}」。`;
        } else {
          updateProjectStatus(result);
          hint.textContent = `项目已保存到「${result.displayName}」。`;
        }
      } catch (error) {
        hint.textContent = `操作失败：${error.message}`;
      }
    }

    function createSwatches() {
      colors.forEach((color, index) => {
        const swatch = document.createElement("button");
        swatch.className = "swatch" + (index === 0 ? " is-active" : "");
        swatch.type = "button";
        swatch.style.background = color;
        swatch.title = color;
        swatch.setAttribute("aria-label", `选择颜色 ${color}`);
        swatch.addEventListener("click", () => {
          selectedColor = color;
          document.querySelectorAll(".swatch").forEach((item) => item.classList.remove("is-active"));
          swatch.classList.add("is-active");
        });
        palette.appendChild(swatch);
      });
    }

    function setTool(tool) {
      selectedTool = tool;
      drawTool.classList.toggle("is-active", tool === "draw");
      eyedropperTool.classList.toggle("is-active", tool === "eyedropper");
      svg.style.cursor = tool === "eyedropper" ? "copy" : "crosshair";
      hint.textContent = tool === "eyedropper"
        ? "吸管已选中。点击任意地域取色。"
        : "柳叶笔已选中。画完会自动闭合并弹出命名。";
    }

    function getSvgPoint(event) {
      const rect = svg.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function simplifyPoints(rawPoints) {
      const simplified = [];
      rawPoints.forEach((point) => {
        const previous = simplified[simplified.length - 1];
        if (!previous || distance(previous, point) > 4) {
          simplified.push(point);
        }
      });
      return simplified;
    }

    function pointsToPath(pathPoints, closed = true) {
      if (!pathPoints.length) return "";
      const commands = [`M ${pathPoints[0].x.toFixed(1)} ${pathPoints[0].y.toFixed(1)}`];
      for (let index = 1; index < pathPoints.length; index += 1) {
        commands.push(`L ${pathPoints[index].x.toFixed(1)} ${pathPoints[index].y.toFixed(1)}`);
      }
      if (closed) commands.push("Z");
      return commands.join(" ");
    }

    function getCentroid(pathPoints) {
      const total = pathPoints.reduce((acc, point) => {
        acc.x += point.x;
        acc.y += point.y;
        return acc;
      }, { x: 0, y: 0 });
      return {
        x: total.x / pathPoints.length,
        y: total.y / pathPoints.length
      };
    }

    function pointInPolygon(point, polygon) {
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i].x;
        const yi = polygon[i].y;
        const xj = polygon[j].x;
        const yj = polygon[j].y;
        const intersects = ((yi > point.y) !== (yj > point.y))
          && (point.x < ((xj - xi) * (point.y - yi)) / (yj - yi) + xi);
        if (intersects) inside = !inside;
      }
      return inside;
    }

    function findSuggestedParent(pathPoints) {
      const center = getCentroid(pathPoints);
      const candidates = regions.filter((region) => pointInPolygon(center, region.points));
      if (!candidates.length) return null;
      return candidates[candidates.length - 1];
    }

    function openNamingModal(pathPoints) {
      const parent = findSuggestedParent(pathPoints);
      suggestedParentId = parent ? parent.id : currentViewId;
      pendingRegion = {
        points: pathPoints,
        color: selectedColor
      };
      form.reset();
      typeInput.value = "city";
      ownershipHint.textContent = parent
        ? `已归属到「${parent.name}」。完成后仍可在后续版本中更改。`
        : currentViewId
          ? `将归属到当前视图「${getRegionById(currentViewId).name}」。`
          : "这个城市属于哪个国家？第一版可先跳过，之后再补上级。";
      modal.classList.add("is-open");
      window.setTimeout(() => nameInput.focus(), 40);
    }

    function closeNamingModal() {
      modal.classList.remove("is-open");
      pendingRegion = null;
      suggestedParentId = null;
    }

    function getRegionById(id) {
      return regions.find((region) => region.id === id);
    }

    function getVisibleRegions() {
      return regions.filter((region) => (region.parentId || null) === currentViewId);
    }

    function getRegionPath(region) {
      const path = [];
      let cursor = region;
      while (cursor) {
        path.unshift(cursor);
        cursor = cursor.parentId ? getRegionById(cursor.parentId) : null;
      }
      return path;
    }

    function renderBreadcrumb() {
      const trail = currentViewId ? getRegionPath(getRegionById(currentViewId)) : [];
      breadcrumb.innerHTML = "";
      const worldButton = document.createElement("button");
      worldButton.type = "button";
      worldButton.textContent = "世界";
      worldButton.addEventListener("click", () => {
        currentViewId = null;
        render();
      });
      breadcrumb.appendChild(worldButton);

      trail.forEach((region) => {
        breadcrumb.append(" > ");
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = region.name;
        button.addEventListener("click", () => {
          currentViewId = region.id;
          render();
        });
        breadcrumb.appendChild(button);
      });
    }

    function renderLayers() {
      layerList.innerHTML = "";
      if (!layers.length) {
        const empty = document.createElement("div");
        empty.className = "layer-item";
        empty.textContent = "还没有图层";
        layerList.appendChild(empty);
        return;
      }

      layers.slice().reverse().forEach((layer) => {
        const region = layer.regionId ? getRegionById(layer.regionId) : null;
        const item = document.createElement("div");
        item.className = "layer-item";

        const color = document.createElement("span");
        color.className = "layer-color";
        color.style.background = region ? region.color : "#fff7df";

        const name = document.createElement("span");
        name.textContent = layer.name;

        const type = document.createElement("span");
        type.textContent = region ? regionTypes[region.type] : "空白";
        type.style.color = "#7a6a4c";
        type.style.fontSize = "12px";

        item.append(color, name, type);
        layerList.appendChild(item);
      });
    }

    function renderRegions() {
      regionLayer.innerHTML = "";
      const visibleRegions = getVisibleRegions();
      emptyState.classList.toggle("is-hidden", visibleRegions.length > 0);
      const emptyTitle = emptyState.querySelector("strong");
      const emptyText = emptyState.querySelector("span");
      if (!regions.length) {
        emptyTitle.textContent = "先画一个地方";
        emptyText.textContent = "按住并拖动画出封闭区域，松手后给它取名。";
      } else {
        emptyTitle.textContent = "这里还没有子地域";
        emptyText.textContent = "继续画一个城市、家族领地或据点，让这个层级长出来。";
      }

      visibleRegions.forEach((region) => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.classList.add("region-group");
        group.dataset.regionId = region.id;

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", pointsToPath(region.points));
        path.setAttribute("fill", region.color);
        path.setAttribute("fill-opacity", "0.74");
        path.classList.add("region-shape");

        const center = getCentroid(region.points);
        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", center.x);
        label.setAttribute("y", center.y);
        label.setAttribute("dy", "0.35em");
        label.classList.add("region-label");
        label.textContent = region.name;

        group.append(path, label);

        group.addEventListener("mouseenter", (event) => showStoryCard(region, event));
        group.addEventListener("mousemove", (event) => positionStoryCard(event));
        group.addEventListener("mouseleave", hideStoryCard);
        group.addEventListener("dblclick", (event) => {
          event.stopPropagation();
          currentViewId = region.id;
          hideStoryCard();
          render();
        });
        group.addEventListener("click", (event) => {
          if (selectedTool === "eyedropper") {
            event.stopPropagation();
            selectedColor = region.color;
            updateActiveSwatch(region.color);
            setTool("draw");
          }
        });

        regionLayer.appendChild(group);
      });
    }

    function updateActiveSwatch(color) {
      const swatches = Array.from(document.querySelectorAll(".swatch"));
      let matched = false;
      swatches.forEach((swatch) => {
        const isMatch = swatch.title.toLowerCase() === color.toLowerCase();
        swatch.classList.toggle("is-active", isMatch);
        if (isMatch) matched = true;
      });
      if (!matched) {
        swatches.forEach((swatch) => swatch.classList.remove("is-active"));
      }
    }

    function render() {
      renderBreadcrumb();
      renderRegions();
      renderLayers();
    }

    function showStoryCard(region, event) {
      storyCard.innerHTML = `
        <h2>${escapeHtml(region.name)}</h2>
        <div class="story-meta">${regionTypes[region.type]}${region.parentId ? ` · 属于 ${escapeHtml(getRegionById(region.parentId).name)}` : ""}</div>
        <p>${escapeHtml(region.summary || "还没有简介")}</p>
        <div class="story-chars">
          ${(region.characterIds.length ? region.characterIds : ["暂无关联角色"]).map((name) => `<span class="chip">${escapeHtml(name)}</span>`).join("")}
        </div>
      `;
      storyCard.classList.add("is-visible");
      positionStoryCard(event);
    }

    function positionStoryCard(event) {
      const margin = 14;
      const rect = storyCard.getBoundingClientRect();
      let left = event.clientX + 18;
      let top = event.clientY + 18;
      if (left + rect.width > window.innerWidth - margin) {
        left = event.clientX - rect.width - 18;
      }
      if (top + rect.height > window.innerHeight - margin) {
        top = event.clientY - rect.height - 18;
      }
      storyCard.style.left = `${Math.max(margin, left)}px`;
      storyCard.style.top = `${Math.max(margin, top)}px`;
    }

    function hideStoryCard() {
      storyCard.classList.remove("is-visible");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function startDrawing(event) {
      if (selectedTool !== "draw" || modal.classList.contains("is-open")) return;
      isDrawing = true;
      points = [getSvgPoint(event)];
      draftPath.setAttribute("d", pointsToPath(points, false));
      svg.setPointerCapture(event.pointerId);
    }

    function continueDrawing(event) {
      if (!isDrawing) return;
      points.push(getSvgPoint(event));
      draftPath.setAttribute("d", pointsToPath(points, false));
    }

    function finishDrawing(event) {
      if (!isDrawing) return;
      isDrawing = false;
      svg.releasePointerCapture(event.pointerId);
      const pathPoints = simplifyPoints(points);
      points = [];
      draftPath.setAttribute("d", "");

      if (pathPoints.length < 8) {
        hint.textContent = "这个区域太小了，再画大一点会更好。";
        return;
      }

      openNamingModal(pathPoints);
    }

    function createRegion(data) {
      const now = new Date().toISOString();
      const region = {
        id: `region-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        name: data.name,
        type: data.type,
        parentId: data.parentId || null,
        points: data.points,
        color: data.color,
        summary: data.summary,
        characterIds: [],
        createdAt: now,
        updatedAt: now
      };

      const layer = {
        id: `layer-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        name: region.name,
        type: "region",
        regionId: region.id,
        visible: true,
        locked: false,
        order: layers.length,
        createdAt: now,
        updatedAt: now
      };

      regions.push(region);
      layers.push(layer);
      return region;
    }

    function exportPng() {
      const width = svg.clientWidth;
      const height = svg.clientHeight;
      const visibleRegions = getVisibleRegions();
      const regionMarkup = visibleRegions.map((region) => {
        const center = getCentroid(region.points);
        return `
          <path d="${pointsToPath(region.points)}" fill="${region.color}" fill-opacity="0.74" stroke="rgba(31,37,32,0.8)" stroke-width="2.2" stroke-linejoin="round"/>
          <text x="${center.x}" y="${center.y}" dy="0.35em" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#24251e" stroke="rgba(255,247,222,0.9)" stroke-width="4" paint-order="stroke">${escapeHtml(region.name)}</text>
        `;
      }).join("");
      const svgText = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
          <rect width="100%" height="100%" fill="#efe1bf"/>
          ${regionMarkup}
        </svg>
      `;
      const image = new Image();
      const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      image.onload = async () => {
        const canvas = document.createElement("canvas");
        canvas.width = svg.clientWidth;
        canvas.height = svg.clientHeight;
        const context = canvas.getContext("2d");
        context.fillStyle = "#efe1bf";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0);
        URL.revokeObjectURL(url);

        const dataUrl = canvas.toDataURL("image/png");
        if (isDesktop) {
          try {
            const currentRegion = currentViewId ? getRegionById(currentViewId) : null;
            const result = await window.desktopAPI.exportPng({
              dataUrl,
              suggestedName: currentRegion ? currentRegion.name : currentProjectName
            });
            if (!result.canceled) hint.textContent = "PNG 已导出。";
          } catch (error) {
            hint.textContent = `PNG 导出失败：${error.message}`;
          }
        } else {
          const link = document.createElement("a");
          link.download = "oc-map.png";
          link.href = dataUrl;
          link.click();
        }
      };

      image.src = url;
    }

    function saveState() {
      if (isDesktop) {
        markProjectChanged();
        return;
      }

      localStorage.setItem("oc-map-studio-prototype", JSON.stringify({
        regions,
        layers,
        currentViewId
      }));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem("oc-map-studio-prototype");
        if (!raw) return;
        const state = JSON.parse(raw);
        regions = Array.isArray(state.regions) ? state.regions : [];
        layers = Array.isArray(state.layers) ? state.layers : [];
        currentViewId = state.currentViewId || null;
      } catch (error) {
        console.warn("Failed to load saved map state", error);
      }
    }

    svg.addEventListener("pointerdown", startDrawing);
    svg.addEventListener("pointermove", continueDrawing);
    svg.addEventListener("pointerup", finishDrawing);
    svg.addEventListener("pointercancel", finishDrawing);

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (!pendingRegion) return;
      const name = nameInput.value.trim();
      if (!name) return;

      const region = createRegion({
        name,
        type: typeInput.value,
        summary: summaryInput.value.trim(),
        points: pendingRegion.points,
        color: pendingRegion.color,
        parentId: suggestedParentId
      });

      if (region.parentId) {
        currentViewId = region.parentId;
      }
      saveState();
      closeNamingModal();
      hint.textContent = `已创建「${region.name}」。双击可进入它的下级视图。`;
      render();
    });

    cancelRegion.addEventListener("click", closeNamingModal);
    drawTool.addEventListener("click", () => setTool("draw"));
    eyedropperTool.addEventListener("click", () => setTool("eyedropper"));
    toggleLayers.addEventListener("click", () => layerPanel.classList.toggle("is-open"));
    exportPngButton.addEventListener("click", exportPng);
    newProjectButton.addEventListener("click", () => runProjectCommand("new"));
    openProjectButton.addEventListener("click", () => runProjectCommand("open"));
    saveProjectButton.addEventListener("click", () => runProjectCommand("save"));

    async function initializeApp() {
      createSwatches();

      if (!isDesktop) {
        document.querySelectorAll(".desktop-only").forEach((element) => {
          element.hidden = true;
        });
        currentProjectName = "浏览器草稿";
        loadState();
        updateProjectStatus({ displayName: currentProjectName, dirty: false });
        render();
        return;
      }

      window.desktopAPI.onCommand((command) => runProjectCommand(command));
      window.desktopAPI.onProjectSaved((metadata) => {
        const isLatestRevision = metadata.revision === projectRevision;
        updateProjectStatus({
          ...metadata,
          dirty: isLatestRevision ? metadata.dirty : true
        });
        if (metadata.automatic && isLatestRevision) {
          hint.textContent = "修改已自动保存。";
        }
      });
      window.desktopAPI.onProjectError((error) => {
        projectDirty = true;
        updateProjectStatus({ dirty: true });
        hint.textContent = error.message;
      });

      try {
        const initialProject = await window.desktopAPI.getInitialProject();
        applyProject(initialProject);
      } catch (error) {
        updateProjectStatus({ displayName: "未命名项目", dirty: false });
        hint.textContent = `桌面项目初始化失败：${error.message}`;
        render();
      }
    }

    initializeApp();
  </script>
</body>
</html>
